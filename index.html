<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Landing</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --subtext: #555;
      --accent: #4f46e5;
    }

    body.dark {
      --bg: #0f172a;
      --text: #f1f5f9;
      --subtext: #94a3b8;
      --accent: #818cf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--bg);
      z-index: 1000;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .logo {
      font-weight: bold;
    }

    .controls button {
      margin-left: 8px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    .hero {
      padding-top: 120px;
      text-align: center;
      padding-bottom: 60px;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 16px;
    }

    p {
      color: var(--subtext);
      font-size: 1.1rem;
    }

    video {
      width: 90%;
      max-width: 900px;
      border-radius: 14px;
      margin-top: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .cta a {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 28px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-decoration: none;
    }

    footer {
      padding: 40px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--subtext);
    }
  </style>
</head>

<body>

<header>
  <div class="logo">My Landing</div>
  <div class="controls">
    <button onclick="toggleLang()">🌐 ENG/KOR</button>
    <button onclick="toggleTheme()">🌙 Mode</button>
  </div>
</header>

<section class="hero">
  <h1 id="title">Experience the Moment</h1>
  <p id="subtitle">A simple and immersive video landing page.</p>

  <video autoplay muted loop playsinline controls>
    <source src="main/asset/video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="cta">
    <a href="#" id="cta">Get Started</a>
  </div>
</section>

<section class="section">
  <h2 id="sectionTitle">About This Project</h2>
  <p id="sectionText">
    This page is designed to highlight your video content with a clean and modern interface.
  </p>
</section>

<footer>
  <p id="footer">© 2026 My Landing. All rights reserved.</p>
</footer>

<script>
  let isKorean = false;

  function toggleLang() {
    isKorean = !isKorean;

    document.getElementById("title").innerText =
      isKorean ? "순간을 경험하세요" : "Experience the Moment";

    document.getElementById("subtitle").innerText =
      isKorean ? "간단하고 몰입감 있는 비디오 랜딩 페이지입니다." :
                 "A simple and immersive video landing page.";

    document.getElementById("cta").innerText =
      isKorean ? "시작하기" : "Get Started";

    document.getElementById("sectionTitle").innerText =
      isKorean ? "프로젝트 소개" : "About This Project";

    document.getElementById("sectionText").innerText =
      isKorean
        ? "이 페이지는 깔끔하고 현대적인 인터페이스로 비디오 콘텐츠를 강조하기 위해 설계되었습니다."
        : "This page is designed to highlight your video content with a clean and modern interface.";

    document.getElementById("footer").innerText =
      isKorean
        ? "© 2026 마이 랜딩. 모든 권리 보유."
        : "© 2026 My Landing. All rights reserved.";
  }

  function toggleTheme() {
    document.body.classList.toggle("dark");
  }
</script>

</body>
</html>
